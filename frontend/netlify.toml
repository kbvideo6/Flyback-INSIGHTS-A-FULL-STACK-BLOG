# ── Netlify build configuration ─────────────────────────────────────────────
# Place this file at the root of the repository (same folder as package.json)

[build]
  # Where netlify runs the build from
  base    = "."
  # Build command
  command = "npm run build"
  # Folder to publish (Vite default output)
  publish = "dist"

# ── Single Page Application (SPA) redirect ───────────────────────────────────
# Without this, refreshing /article/some-slug returns a 404 because
# Netlify tries to find a real file at that path.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
