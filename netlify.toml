# ── Netlify build configuration ──────────────────────────────────────────────
# This file MUST live at the repository root (same level as /frontend, /backend)

[build]
  # Tell Netlify to cd into the frontend subfolder before building
  base    = "frontend"
  # Build command (runs inside base directory)
  command = "npm run build"
  # Publish directory — relative to the base directory
  publish = "dist"

# ── SPA redirect — required for React Router ─────────────────────────────────
# Without this, refreshing any route (e.g. /article/my-slug) returns 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
